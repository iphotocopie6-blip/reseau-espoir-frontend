<!DOCTYPE html>
<html lang="fr"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>RESEAU ESPOIR - Photo Simple</title>
<link rel="manifest" href="manifest.json"/><meta name="theme-color" content="#f97316"/>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/><script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>#map{height:350px;border-radius:24px} #preview{max-height:180px;border-radius:16px;border:2px solid #f97316}</style></head>
<body class="bg-[#f5f7f9]">
<header class="sticky top-0 bg-white border-b z-[1000]"><div class="max-w-6xl mx-auto px-6 h- flex justify-between items-center"><div class="flex items-center gap-2"><div class="w-10 h-10 rounded-xl bg-gradient-to-br from-orange-500 to-green-600 flex items-center justify-center text-white font-extrabold">RE</div><div><div class="font-extrabold text-sm">RESEAU ESPOIR</div><div class="text- font-bold text-orange-500">V18 SIMPLE PHOTO</div></div></div><button onclick="openAdmin()" class="px-3 py-2 rounded-full bg-slate-900 text-white text-xs font-bold">🔐 Admin</button></div></header>
<div class="max-w-6xl mx-auto px-6 mt-4 grid grid-cols-3 gap-2 text-center"><div class="bg-slate-900 text-white rounded-xl p-3"><div class="text-">TOTAL</div><div id="statTotal" class="text-2xl font-extrabold">0</div></div><div class="bg-white border rounded-xl p-3"><div class="text-">MODE</div><div class="font-bold text-green-600 text-xs">● PHOTO SIMPLE</div></div><div class="bg-orange-500 text-white rounded-xl p-3"><div class="text-">HEBERGEUR</div><div class="font-bold text-">0x0.st GRATUIT</div></div></div>
<main class="max-w-6xl mx-auto px-6 py-4 grid md:grid-cols-[380px_1fr] gap-4">
<div class="bg-white rounded- p-5 border shadow-sm"><h3 class="font-extrabold">📸 Signaler avec photo (sans serveur)</h3><textarea id="txt" placeholder="Ex: Poubelle débordée à Riviera..." class="w-full mt-3 h-20 p-3 rounded-xl bg-slate-50 border text-sm"></textarea><label class="mt-3 w-full flex flex-col items-center px-4 py-5 bg-orange-50 text-orange-600 rounded-xl border-2 border-dashed border-orange-200 cursor-pointer"><span>📷</span><span class="text-xs font-bold">Ajouter photo</span><input type="file" id="photoInput" accept="image/*" class="hidden" onchange="previewPhoto(event)"/></label><img id="preview" class="hidden mt-2 w-full object-cover"/><div id="photoInfo" class="hidden mt-1 text- font-bold"></div><button onclick="clearPhoto()" id="removePhoto" class="hidden mt-1 text-xs text-red-500 font-bold">❌ Retirer</button><button onclick="send()" id="sendBtn" class="w-full mt-3 p-3 rounded-xl bg-slate-900 text-white font-bold">📸 Envoyer →</button><div id="status" class="mt-2 text- font-bold"></div></div>
<div class="bg-white rounded- p-5 border shadow-sm"><div class="flex justify-between"><h3 class="font-extrabold">📋 Fil public (<span id="count">0</span>)</h3><button onclick="load()" class="text-xs bg-slate-100 px-2 py-1 rounded-full">↻</button></div><div id="list" class="mt-3 space-y-3 max-h- overflow-auto"></div></div>
</main>
<div class="max-w-6xl mx-auto px-6"><div class="bg-white rounded- p-3 border"><div id="map"></div></div></div>
<div id="loginModal" class="hidden fixed inset-0 bg-black/60 z-[3000] flex items-center justify-center p-6"><div class="bg-white rounded-xl p-6 w-full max-w-sm"><input id="pass" type="password" placeholder="civ2024" class="w-full p-3 border rounded-xl"/><button onclick="doLogin()" class="w-full mt-3 p-3 bg-slate-900 text-white rounded-xl font-bold">OK</button></div></div>
<div id="adminModal" class="hidden fixed inset-0 bg-black/60 z-[3000] flex items-center justify-center p-6"><div class="bg-white rounded-xl w-full max-w-xl max-h- overflow-auto p-5"><div class="flex justify-between"><h2 class="font-bold">Admin</h2><button onclick="document.getElementById('adminModal').classList.add('hidden')" class="bg-slate-100 px-3 py-1 rounded-full">Fermer</button></div><div id="adminList" class="mt-3 divide-y"></div></div></div>
<script>
const API="https://reseau-espoir-backend.onrender.com"; let allData=[], map, markers=[], currentFile=null, currentPreview=null;
function initMap(){ map=L.map('map').setView([5.359,-3.983],13); L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map); }
function updateMap(){ markers.forEach(m=>map.removeLayer(m)); markers=[]; allData.forEach((s,i)=>{ let lat=5.359+(Math.random()-0.5)*0.02, lng=-3.983+(Math.random()-0.5)*0.02; let m=L.marker([lat,lng],{icon:L.divIcon({html:`<div style='background:#ef4444;width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:white;font-weight:bold;border:2px solid white'>${i+1}</div>`,className:''})}).addTo(map); let photo=getPhotoUrl(s.text); let img=photo?`<br/><img src='${photo}' style='width:100px;border-radius:8px'/>`:''; m.bindPopup(`#${i+1} ${s.text.substring(0,40)}${img}`); markers.push(m); }); }
function getPhotoUrl(text){ let m=text.match(/\[PHOTO\](https:\/\/[^\s]+)/); return m?m[1]:null; }
function getTextOnly(text){ return text.replace(/\[PHOTO\]https:\/\/[^\s]+/,'').trim(); }
function previewPhoto(e){ const file=e.target.files[0]; if(!file) return; currentFile=file; const reader=new FileReader(); reader.onload=ev=>{ const img=new Image(); img.onload=()=>{ const canvas=document.createElement('canvas'); let maxW=600, w=img.width, h=img.height; if(w>maxW){ h=h*maxW/w; w=maxW; } canvas.width=w; canvas.height=h; canvas.getContext('2d').drawImage(img,0,0,w,h); canvas.toBlob(blob=>{ currentFile=new File([blob], file.name, {type:'image/jpeg'}); currentPreview=URL.createObjectURL(blob); document.getElementById('preview').src=currentPreview; document.getElementById('preview').classList.remove('hidden'); document.getElementById('removePhoto').classList.remove('hidden'); document.getElementById('photoInfo').classList.remove('hidden'); document.getElementById('photoInfo').innerText=`✅ ${(blob.size/1024).toFixed(0)}KB prête à envoyer`; }, 'image/jpeg', 0.6); }; img.src=ev.target.result; }; reader.readAsDataURL(file); }
function clearPhoto(){ currentFile=null; currentPreview=null; document.getElementById('photoInput').value=''; document.getElementById('preview').classList.add('hidden'); document.getElementById('removePhoto').classList.add('hidden'); document.getElementById('photoInfo').classList.add('hidden'); }
function load(){ fetch(API+"?signalements").then(r=>r.json()).then(d=>{ if(Array.isArray(d)){ allData=d; render(); updateMap(); } }); }
function render(){ document.getElementById('count').innerText=allData.length; document.getElementById('statTotal').innerText=allData.length; let h=""; allData.forEach((s,i)=>{ let photo=getPhotoUrl(s.text); let txt=getTextOnly(s.text); let img=photo?`<img src='${photo}' class='mt-2 w-full h-44 object-cover rounded-xl border' onerror="this.style.display='none'"/>`:'<div class="mt-1 text- text-slate-400">Pas de photo</div>'; h+=`<div class="p-3 rounded-xl bg-slate-50 border"><div class="flex justify-between text-"><span class="font-bold text-orange-600">#${i+1} COCODY ${photo?'📸':''}</span><span class="text-slate-400">${s.date||''}</span></div><div class="mt-1 text-sm font-semibold">${txt}</div>${img}</div>`; }); document.getElementById('list').innerHTML=h||'Vide'; let ah=""; allData.forEach(s=>{ ah+=`<div class="py-2 flex justify-between"><div class="text-sm">${getTextOnly(s.text).substring(0,40)}</div><button onclick="del(${s.id})" class="text-xs bg-red-50 text-red-600 px-2 py-1 rounded-full">Supp</button></div>`; }); document.getElementById('adminList').innerHTML=ah; }
async function uploadTo0x0(file){ const fd=new FormData(); fd.append('file', file); const res=await fetch('https://0x0.st', {method:'POST', body:fd}); if(!res.ok) throw new Error('Upload échoué'); const url=(await res.text()).trim(); return url; }
async function send(){ let t=document.getElementById('txt').value.trim(); if(!t) return alert('Écris texte!'); let btn=document.getElementById('sendBtn'), st=document.getElementById('status'); btn.disabled=true; try{ let finalText=t; if(currentFile){ st.innerText='📤 Upload photo vers 0x0.st...'; btn.innerText='⏳ Upload photo...'; let photoUrl=await uploadTo0x0(currentFile); console.log('Photo URL:', photoUrl); finalText=t+` [PHOTO]${photoUrl}`; st.innerText='✅ Photo hébergée! Envoi au backend...'; } btn.innerText='⏳ Envoi backend...'; let r=await fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text:finalText})}); let res=await r.json(); if(res.all){ allData=res.all; render(); updateMap(); } document.getElementById('txt').value=''; clearPhoto(); st.innerText='✅ Envoyé avec photo!'; btn.innerText='📸 Envoyer →'; }catch(e){ st.innerText='❌ Erreur: '+e.message; alert('Erreur: '+e.message); btn.innerText='📸 Envoyer →'; } btn.disabled=false; setTimeout(()=>document.getElementById('status').innerText='',3000); }
function openAdmin(){ if(localStorage.getItem('admin')==='1'){ document.getElementById('adminModal').classList.remove('hidden'); } else document.getElementById('loginModal').classList.remove('hidden'); }
function doLogin(){ let p=document.getElementById('pass').value; fetch(API+'?login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:p})}).then(r=>r.json()).then(res=>{ if(res.status==='ok'){ localStorage.setItem('admin','1'); document.getElementById('loginModal').classList.add('hidden'); document.getElementById('adminModal').classList.remove('hidden'); } else alert('MDP faux'); }); }
function del(id){ if(!confirm('Supprimer?')) return; fetch(API+'?delete',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id})}).then(()=>load()); }
initMap(); load(); setInterval(load,8000);
</script>
</body></html>
