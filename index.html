<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RESEAU ESPOIR V20.2</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>#map{height:400px;border-radius:16px}.scroll-fix{max-height:82vh;overflow-y:auto}</style>
</head>
<body class="bg-[#f7f5]">
<header class="bg-white shadow-sm p-3 flex justify-between items-center sticky top-0 z-50">
<div class="flex items-center gap-2"><div class="bg-orange-500 text-white w-9 h-9 rounded-xl flex items-center justify-center font-black">RE</div><div><div class="font-black">RESEAU ESPOIR</div><div class="text- text-orange-500 font-bold">V20.2 SECURE + LIKE + MAP + PHOTO</div></div></div>
<div class="flex gap-2 items-center"><button onclick="doLogin()" class="bg-black text-white px-4 py-1.5 rounded-full text-sm">🔐 Admin</button><span id="adminCount" class="bg-orange-100 px-3 py-1 rounded-full text-sm font-bold">0</span></div>
</header>

<div class="max-w- mx-auto p-3 grid lg:grid-cols-2 gap-4">
<div class="space-y-4">
<div class="bg-white rounded-2xl p-4 shadow-sm border">
<h3 class="font-bold flex gap-2">📸 Signaler un problème</h3>
<textarea id="txt" placeholder="Ex: Eau usée Agbekoi, canal bouché, ordures..." class="w-full border border-gray-200 rounded-xl p-3 h-24 mt-2 focus:outline-none focus:border-orange-400"></textarea>
<div class="mt-3 border-2 border-dashed border-orange-200 rounded-xl p-3 text-center bg-[#fff8f0]">
<input type="file" id="photoInput" accept="image/*" hidden onchange="previewPhoto(this)">
<button onclick="document.getElementById('photoInput').click()" class="text-sm font-medium">📷 Ajouter une photo (preuve)</button>
<img id="preview" class="hidden w-full mt-3 rounded-xl max-h-60 object-cover">
</div>
<button onclick="envoyer()" id="btnEnvoyer" class="w-full bg-black text-white mt-3 py-3 rounded-full font-bold">Envoyer →</button>
<div class="text-xs text-gray-400 mt-2 text-center"><span id="compteur">0</span> signalements • Anti-spam 10s</div>
</div>
<div id="map" class="shadow-sm border"></div>
</div>
<div><div id="list" class="space-y-3"></div></div>
</div>

<!-- ADMIN AVEC SCROLL -->
<div id="adminPanel" class="hidden fixed top-0 right-0 w- max-w- h-screen bg-white z-[9999] shadow-2xl flex flex-col">
<div class="p-4 bg-black text-white flex justify-between items-center"><b>🛡️ Admin Panel</b><button onclick="closeAdmin()" class="bg-white text-black w-8 h-8 rounded-full">✕</button></div>
<div id="adminList" class="flex-1 scroll-fix p-3 space-y-2"></div>
<div class="p-3 border-t bg-gray-50 flex justify-between text-xs"><span><span id="adminTotal">0</span> posts</span><span class="text-gray-400">↕ Scroller avec molette</span></div>
</div>

<script>
const API = 'https://reseau-espoir-backend.onrender.com';
let allData=[]; let photoBase64=null;
const map = L.map('map').setView([5.36, -4.00], 12);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
let markersLayer = L.layerGroup().addTo(map);

function previewPhoto(input){
  if(input.files[0]){
    const reader = new FileReader();
    reader.onload = e=>{ photoBase64=e.target.result; const img=document.getElementById('preview'); img.src=photoBase64; img.classList.remove('hidden'); };
    reader.readAsDataURL(input.files[0]);
  }
}
async function envoyer(){
  const text=document.getElementById('txt').value.trim();
  if(!text) return alert('Écris quelque chose');
  const btn=document.getElementById('btnEnvoyer'); btn.innerText='Envoi en cours...'; btn.disabled=true;
  try{
    const r=await fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text, photo: photoBase64})});
    const j=await r.json();
    if(j.error){ alert(j.error); } else { allData=j.all||[]; render(); document.getElementById('txt').value=''; photoBase64=null; document.getElementById('preview').classList.add('hidden'); document.getElementById('photoInput').value=''; }
  }catch(e){ alert(e.message); }
  btn.innerText='Envoyer →'; btn.disabled=false;
}
async function load(){
  const r=await fetch(API+'/?signalements'); allData=await r.json(); render();
}
function render(){
  const c=document.getElementById('list'); c.innerHTML=''; markersLayer.clearLayers();
  const adminC=document.getElementById('adminList'); if(adminC) adminC.innerHTML='';
  document.getElementById('compteur').innerText=allData.length;
  document.getElementById('adminCount').innerText=allData.length;
  const totalEl=document.getElementById('adminTotal'); if(totalEl) totalEl.innerText=allData.length;

  allData.forEach((item, idx)=>{
    const likes = parseInt(localStorage.getItem('like_'+item.id)||'0');
    const hasLiked = localStorage.getItem('liked_'+item.id)==='1';
    const div=document.createElement('div');
    div.className='bg-white rounded-2xl p-4 shadow-sm border border-gray-100';
    div.innerHTML=`
      <div class="flex justify-between items-start"><div class="font-medium text-sm">${item.text}</div><span class="text- bg-gray-100 px-2 py-1 rounded-full">#${allData.length-idx}</span></div>
      ${item.photo?`<img src="${item.photo}" class="w-full mt-3 rounded-xl max-h-80 object-cover border">`:''}
      <div class="flex gap-2 mt-3">
        <button onclick="like(${item.id})" class="flex items-center gap-1 border px-3 py-1.5 rounded-full text-xs ${hasLiked?'bg-orange-500 text-white border-orange-500':'bg-white'}">❤️ <span id="like-${item.id}">${likes}</span> Like</button>
        <button onclick="partager('${item.text.replace(/'/g,"\\'")}')" class="border px-3 py-1.5 rounded-full text-xs">↗️ Partager</button>
        <span class="ml-auto text- text-gray-400">${item.date||''}</span>
      </div>`;
    c.appendChild(div);

    // Map marker aléatoire autour d'Abidjan
    const lat = 5.32 + Math.random()*0.12;
    const lng = -4.08 + Math.random()*0.18;
    L.marker([lat,lng]).addTo(markersLayer).bindPopup(item.text.substring(0,60));

    if(adminC){
      const a=document.createElement('div');
      a.className='border rounded-xl p-2 flex justify-between items-center gap-2 hover:bg-gray-50';
      a.innerHTML=`<div class="flex-1 min-w-0"><div class="text- truncate font-medium">${item.text}</div><div class="text- text-gray-400">ID:${item.id} • ${item.date||''}</div></div><button onclick="del(${item.id})" class="bg-red-500 hover:bg-red-600 text-white px-3 py-1 rounded-full text-xs shrink-0">Supprimer</button>`;
      adminC.appendChild(a);
    }
  });
}
function like(id){
  if(localStorage.getItem('liked_'+id)==='1') return;
  let n=parseInt(localStorage.getItem('like_'+id)||'0')+1;
  localStorage.setItem('like_'+id, n); localStorage.setItem('liked_'+id,'1');
  const el=document.getElementById('like-'+id); if(el) el.innerText=n;
}
function partager(txt){ if(navigator.share){ navigator.share({title:'Reseau Espoir', text: txt}); } else { navigator.clipboard.writeText(txt); alert('Copié!'); } }
async function doLogin(){
  if(localStorage.getItem('admin')==='1'){ document.getElementById('adminPanel').classList.remove('hidden'); return; }
  const p=prompt('Mot de passe admin:');
  if(!p) return;
  const r=await fetch(API+'/?login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:p})});
  const j=await r.json();
  if(j.status==='ok'){ localStorage.setItem('admin','1'); localStorage.setItem('admin_token', j.token); document.getElementById('adminPanel').classList.remove('hidden'); }
  else alert('Mauvais mot de passe');
}
function closeAdmin(){ document.getElementById('adminPanel').classList.add('hidden'); }
async function del(id){
  if(!confirm('Supprimer ce signalement ID '+id+'?')) return;
  const token = localStorage.getItem('admin_token') || prompt('Mot de passe admin?');
  if(!token) return;
  try{
    const r=await fetch(API+'/?delete',{method:'POST',headers:{'Content-Type':'application/json'},body: JSON.stringify({id, password: token, token: token})});
    const j=await r.json();
    if(j.error){ alert('Erreur: '+j.error+'\nEssaie de te reconnecter'); localStorage.removeItem('admin'); }
    else { allData=j.all||[]; render(); }
  }catch(e){ alert('Erreur réseau: '+e.message); }
}
load();
</script>
</body>
</html>
