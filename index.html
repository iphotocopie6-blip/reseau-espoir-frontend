<script>
const API="https://reseau-espoir-backend.onrender.com"; let allData=[], currentBase64=null;
function getPhotoUrl(s){ return s.photo || null; }
function getTextOnly(t){ return (t||'').replace(/\[PHOTO\]data:image\/[^;]+;base64,[^\s]+/,'').trim(); }
function previewPhoto(e){
  const file=e.target.files[0]; if(!file) return;
  console.log('FICHIER CHOISI', file.name, file.size);
  const r=new FileReader();
  r.onload=ev=>{
    const img=new Image();
    img.onload=()=>{
      const c=document.createElement('canvas');
      let maxW=600,w=img.width,h=img.height;
      if(w>maxW){h=h*maxW/w;w=maxW;}
      c.width=w;c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      currentBase64=c.toDataURL('image/jpeg',0.6);
      const p=document.getElementById('preview');
      p.src=currentBase64;
      p.classList.remove('hidden');
      document.getElementById('photoStatus').innerText='✅ Photo prête ('+Math.round(currentBase64.length/1024)+'KB)';
      console.log('PHOTO CONVERTIE', currentBase64.length);
    };
    img.src=ev.target.result;
  };
  r.readAsDataURL(file);
}
function load(){ fetch(API+"?signalements").then(r=>r.json()).then(d=>{ if(Array.isArray(d)){ allData=d.sort((a,b)=>b.id-a.id); render(); } }); }
function render(){
  document.getElementById('count').innerText=allData.length;
  document.getElementById('statTotal').innerText=allData.length;
  let h="";
  allData.forEach(s=>{
    let photo=getPhotoUrl(s);
    let txt=getTextOnly(s.text);
    let img=photo?`<img src='${photo}' class='mt-2 w-full h-60 object-cover rounded-xl border-2 border-green-400'/>`:`<div class="text- text-slate-400 mt-1 italic">Pas de photo</div>`;
    h+=`<div class="p-4 rounded-2xl bg-slate-50 border"><div class="flex justify-between text-"><span class="font-bold text-orange-600">#${s.id} 📸 • Côte d'Ivoire</span><span class="text-slate-400">${s.date||''}</span></div><div class="mt-1 font-semibold text-sm">${txt}</div>${img}</div>`;
  });
  document.getElementById('list').innerHTML=h;
}
async function send(){
  let t=document.getElementById('txt').value.trim();
  if(!t) return alert('Écris un texte');
  if(!currentBase64) return alert('⚠️ Clique d\'abord sur Ajouter photo et choisis une image! Sinon ça sera "Pas de photo"');
  let btn=document.getElementById('sendBtn'); btn.disabled=true; btn.innerText='⏳ Envoi photo...';
  try{
    let r=await fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text:t,photo:currentBase64})});
    let res=await r.json();
    if(res.all){ allData=res.all.sort((a,b)=>b.id-a.id); render(); }
    document.getElementById('txt').value=''; currentBase64=null;
    document.getElementById('preview').classList.add('hidden');
    document.getElementById('photoStatus').innerText='';
    btn.innerText='Envoyer →';
  }catch(e){ btn.innerText='Erreur'; console.log(e); }
  btn.disabled=false;
}
if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js?v=29'); load();
</script>
