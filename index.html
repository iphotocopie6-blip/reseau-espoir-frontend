<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>RESEAU ESPOIR CITOYEN</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>body{margin:0;font-family:sans-serif;background:#f1f5f9}</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const API_URL="https://reseau-espoir-backend.onrender.com";
function App(){
  const [apiStatus,setApiStatus]=React.useState("Connexion...");
  const [signalement,setSignalement]=React.useState("");
  const [liste,setListe]=React.useState([]);
  React.useEffect(()=>{fetch(API_URL).then(r=>r.json()).then(d=>setApiStatus(d.message)).catch(()=>setApiStatus("Backend hors ligne ❌"))},[]);
  const envoyer=()=>{
    if(!signalement.trim()) return;
    setListe([signalement, ...liste]);
    setSignalement("");
  };
  return(
    <div style={{minHeight:'100vh',padding:20}}>
      <div style={{maxWidth:600,margin:'0 auto',background:'white',borderRadius:20,padding:30,boxShadow:'0 10px 30px rgba(0,0,0,0.1)'}}>
        <div style={{textAlign:'center',marginBottom:20}}>
          <h1 style={{color:'#0f172a',fontSize:26,fontWeight:800}}>RESEAU ESPOIR CITOYEN</h1>
          <div style={{background:'#dcfce7',color:'#166534',padding:'8px 16px',borderRadius:20,fontSize:13,fontWeight:700,display:'inline-block',marginTop:10}}>{apiStatus}</div>
        </div>
        <div style={{marginTop:25}}>
          <h3>🚨 Faire un signalement</h3>
          <textarea value={signalement} onChange={e=>setSignalement(e.target.value)} placeholder="Ex: Route dégradée à Cocody..." style={{width:'100%',height:100,padding:15,borderRadius:12,border:'1px solid #cbd5e1',marginTop:10,fontSize:15}}></textarea>
          <button onClick={envoyer} style={{width:'100%',marginTop:12,padding:14,background:'#0f172a',color:'white',border:'none',borderRadius:12,fontWeight:700,fontSize:16,cursor:'pointer'}}>Envoyer le signalement</button>
        </div>
        <div style={{marginTop:25}}>
          <h3>📋 Signalements récents ({liste.length})</h3>
          {liste.length===0 && <div style={{color:'#94a3b8',fontSize:14}}>Aucun signalement pour l'instant, sois le premier !</div>}
          {liste.map((item,i)=><div key={i} style={{background:'#f8fafc',padding:12,borderRadius:10,marginTop:8,borderLeft:'4px solid #0f172a'}}>{item}</div>)}
        </div>
        <div style={{marginTop:30,textAlign:'center',fontSize:12,color:'#94a3b8'}}>Frontend + Backend Connectés ✅</div>
      </div>
    </div>
  );
}
const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
