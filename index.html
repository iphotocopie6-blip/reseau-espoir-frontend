<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>RESEAU ESPOIR CITOYEN</title><script src="https://unpkg.com/react@18/umd/react.development.js"></script><script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script><script src="https://unpkg.com/@babel/standalone/babel.min.js"></script><style>body{margin:0;font-family:sans-serif;background:#f1f5f9}</style></head><body><div id="root"></div><script type="text/babel">
const API="https://reseau-espoir-backend.onrender.com";
function App(){
  const [view,setView]=React.useState("home");
  const [status,setStatus]=React.useState("Connexion...");
  const [text,setText]=React.useState(""); const [liste,setListe]=React.useState([]);
  const [pass,setPass]=React.useState(""); const [isAdmin,setIsAdmin]=React.useState(localStorage.getItem("admin")==="1");
  React.useEffect(()=>{fetch(API).then(r=>r.json()).then(d=>setStatus(d.message+" "+(d.db||""))).catch(()=>setStatus("Hors ligne"));
    load();},[]);
  const load=()=>{fetch(API+"?signalements").then(r=>r.json()).then(d=>{if(Array.isArray(d)) setListe(d)}).catch(()=>{})};
  const envoyer=()=>{if(!text.trim()) return; fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text})}).then(r=>r.json()).then(res=>{if(res.all) setListe(res.all)}); setText(""); setTimeout(load,500);};
  const login=()=>{fetch(API+"?login",{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:pass})}).then(r=>r.json()).then(res=>{if(res.status==="ok"){localStorage.setItem("admin","1"); setIsAdmin(true); setView("admin"); load();} else alert("Mot de passe incorrect");});};
  const del=(id)=>{if(!confirm("Supprimer ce signalement ?")) return; fetch(API+"?delete",{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id, token:"admin_ok", password:pass})}).then(()=>load());};
  const logout=()=>{localStorage.removeItem("admin"); setIsAdmin(false); setView("home");};
  if(view==="login") return(<div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',padding:20}}><div style={{background:'white',padding:40,borderRadius:20,width:350,boxShadow:'0 10px 30px rgba(0,0,0,0.1)'}}><h2>🔐 Admin Login</h2><input type="password" value={pass} onChange={e=>setPass(e.target.value)} placeholder="Mot de passe" style={{width:'100%',padding:12,borderRadius:10,border:'1px solid #ccc',marginTop:15}}/><button onClick={login} style={{width:'100%',marginTop:15,padding:12,background:'#0f172a',color:'white',border:'none',borderRadius:10,fontWeight:700}}>Se connecter</button><button onClick={()=>setView("home")} style={{width:'100%',marginTop:10,padding:10,background:'#e2e8f0',border:'none',borderRadius:10}}>Retour</button></div></div>);
  if(view==="admin" && isAdmin) return(<div style={{minHeight:'100vh',padding:20}}><div style={{maxWidth:800,margin:'0 auto',background:'white',borderRadius:20,padding:25}}><div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}><h2>👑 Tableau Admin - {liste.length} signalements</h2><div><button onClick={load} style={{padding:8,marginRight:10}}>🔄</button><button onClick={logout} style={{padding:8,background:'#ef4444',color:'white',border:'none',borderRadius:8}}>Déconnexion</button></div></div><div style={{marginTop:20}}>{liste.map(s=><div key={s.id} style={{display:'flex',justifyContent:'space-between',padding:12,borderBottom:'1px solid #f1f5f9'}}><div><b>{s.date}</b><br/>{s.text}</div><button onClick={()=>del(s.id)} style={{background:'#fee2e2',color:'#dc2626',border:'none',borderRadius:8,padding:'6px 12px',height:30}}>Supprimer</button></div>)}</div><button onClick={()=>setView("home")} style={{marginTop:20,padding:10}}>← Retour site</button></div></div>);
  return(<div style={{minHeight:'100vh',padding:20}}><div style={{maxWidth:600,margin:'0 auto',background:'white',borderRadius:20,padding:30,boxShadow:'0 10px 30px rgba(0,0,0,0.1)'}}><div style={{display:'flex',justifyContent:'space-between'}}><h1 style={{color:'#0f172a',fontSize:22,fontWeight:800}}>RESEAU ESPOIR CITOYEN</h1><button onClick={()=>isAdmin?setView("admin"):setView("login")} style={{height:35,padding:'0 12px',borderRadius:20,border:'1px solid #cbd5e1',background:isAdmin?'#dcfce7':'white'}}>{isAdmin?'👑 Admin':'🔐 Admin'}</button></div><div style={{background:'#dcfce7',color:'#166534',padding:'8px 16px',borderRadius:20,fontSize:12,fontWeight:700,display:'inline-block',marginTop:10}}>{status}</div><div style={{marginTop:25}}><h3>🚨 Faire un signalement</h3><textarea value={text} onChange={e=>setText(e.target.value)} placeholder="Ex: Route dégradée à Cocody..." style={{width:'100%',height:100,padding:15,borderRadius:12,border:'1px solid #cbd5e1',marginTop:10}}></textarea><button onClick={envoyer} style={{width:'100%',marginTop:12,padding:14,background:'#0f172a',color:'white',border:'none',borderRadius:12,fontWeight:700}}>Envoyer</button></div><div style={{marginTop:25}}><h3>📋 Signalements ({liste.length})</h3>{liste.map((s,i)=><div key={s.id||i} style={{background:'#f8fafc',padding:12,borderRadius:10,marginTop:8,borderLeft:'4px solid #16a34a'}}><div style={{fontSize:12,color:'#64748b'}}>{s.date}</div>{s.text}</div>)}</div></div></div>);
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script></body></html>
