<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RESEAU ESPOIR V20.1</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>#map{height:380px;border-radius:12px}</style>
</head>
<body class="bg-gray-50">
<header class="bg-white shadow p-3 flex justify-between items-center sticky top-0 z-50">
<div class="flex items-center gap-2"><div class="bg-orange-500 text-white w-8 h-8 rounded flex items-center justify-center font-bold">RE</div><div><b>RESEAU ESPOIR</b><div class="text-xs text-orange-500 font-bold">V20.1 SECURE + LIKE + SCROLL FIX</div></div></div>
<div class="flex gap-2"><button onclick="doLogin()" class="bg-black text-white px-3 py-1 rounded-full text-sm">🔐 Admin</button><span id="adminCount" class="bg-orange-100 px-2 py-1 rounded-full text-sm">0</span></div>
</header>

<div class="max-w-6xl mx-auto p-3 grid md:grid-cols-2 gap-4">
<div>
<div class="bg-white rounded-xl p-4 shadow">
<h3 class="font-bold mb-2">📸 Signaler</h3>
<textarea id="txt" placeholder="Ex: Eau usée Agbekoi..." class="w-full border rounded-lg p-2 h-20"></textarea>
<div class="mt-2 border-2 border-dashed rounded-lg p-3 text-center bg-orange-50">
<input type="file" id="photoInput" accept="image/*" hidden onchange="previewPhoto(this)">
<button onclick="document.getElementById('photoInput').click()" class="text-sm">📷 Ajouter photo</button>
<img id="preview" class="hidden w-full mt-2 rounded-lg max-h-40 object-cover">
</div>
<button onclick="envoyer()" class="w-full bg-black text-white mt-3 py-2 rounded-full font-bold">Envoyer →</button>
</div>
<div id="map" class="mt-4"></div>
</div>
<div><div id="list" class="space-y-3"></div></div>
</div>

<!-- ADMIN PANEL AVEC SCROLL FIX -->
<div id="adminPanel" class="hidden fixed top-0 right-0 w- h-screen bg-white z-[9999] shadow-2xl flex flex-col">
<div class="p-3 border-b flex justify-between items-center bg-black text-white">
<b>Admin - Signalements</b><button onclick="document.getElementById('adminPanel').classList.add('hidden')" class="bg-white text-black px-2 rounded">X</button>
</div>
<div id="adminList" class="flex-1 overflow-y-auto p-3 space-y-2" style="max-height:85vh; overflow-y:auto;"></div>
<div class="p-3 border-t text-xs text-gray-500">Molette pour scroller • <span id="adminTotal">0</span> posts</div>
</div>

<script>
const API = 'https://reseau-espoir-backend.onrender.com';
let allData=[]; let photoBase64=null;
const map = L.map('map').setView([5.345, -4.024], 11);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

function previewPhoto(input){
  if(input.files && input.files[0]){
    const reader = new FileReader();
    reader.onload = e=>{
      photoBase64 = e.target.result;
      const img=document.getElementById('preview');
      img.src=photoBase64; img.classList.remove('hidden');
    };
    reader.readAsDataURL(input.files[0]);
  }
}
async function envoyer(){
  const text=document.getElementById('txt').value.trim();
  if(!text) return alert('Écris quelque chose');
  const btn=document.querySelector('button[onclick="envoyer()"]');
  btn.innerText='Envoi...'; btn.disabled=true;
  try{
    const r=await fetch(API, {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({text, photo: photoBase64})});
    const j=await r.json();
    if(j.all){ allData=j.all; render(); document.getElementById('txt').value=''; photoBase64=null; document.getElementById('preview').classList.add('hidden'); }
  }catch(e){ alert('Erreur: '+e.message); }
  btn.innerText='Envoyer →'; btn.disabled=false;
}
async function load(){
  const r=await fetch(API+'/?signalements'); allData=await r.json(); render();
  document.getElementById('adminCount').innerText=allData.length;
}
function render(){
  const c=document.getElementById('list'); c.innerHTML='';
  const adminC=document.getElementById('adminList'); if(adminC) adminC.innerHTML='';
  allData.forEach((item,i)=>{
    const div=document.createElement('div');
    div.className='bg-white rounded-xl p-3 shadow';
    div.innerHTML=`<div class="text-sm">${item.text}</div>${item.photo?`<img src="${item.photo}" class="w-full mt-2 rounded-lg max-h-48 object-cover">`:''}<div class="text-xs text-gray-400 mt-1">${item.date||''}</div>`;
    c.appendChild(div);
    if(adminC){
      const a=document.createElement('div');
      a.className='border p-2 rounded flex justify-between items-center gap-2';
      a.innerHTML=`<div class="flex-1"><div class="text-sm truncate">${item.text.substring(0,40)}</div><div class="text-xs text-gray-400">${item.date||''} • ID:${item.id}</div></div><button onclick="del(${item.id})" class="bg-red-500 text-white px-3 py-1 rounded-full text-xs">Supprimer</button>`;
      adminC.appendChild(a);
    }
  });
  document.getElementById('adminTotal').innerText=allData.length;
}
async function doLogin(){
  if(localStorage.getItem('admin')==='1'){ document.getElementById('adminPanel').classList.remove('hidden'); return; }
  const p=prompt('Mot de passe admin:');
  if(!p) return;
  const r=await fetch(API+'/?login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:p})});
  const j=await r.json();
  if(j.status==='ok'){ localStorage.setItem('admin','1'); localStorage.setItem('admin_token', j.token); document.getElementById('adminPanel').classList.remove('hidden'); }
  else alert('Mauvais mdp');
}
async function del(id){
  if(!confirm('Supprimer ID '+id+'?')) return;
  const token = localStorage.getItem('admin_token') || 'Galilee2026!';
  try{
    const r=await fetch(API+'/?delete',{method:'POST',headers:{'Content-Type':'application/json'},body: JSON.stringify({id, password: token, token: token})});
    const j=await r.json();
    if(j.error) alert('Erreur: '+j.error);
    else { allData=j.all||[]; render(); document.getElementById('adminCount').innerText=allData.length; }
  }catch(e){ alert('Erreur réseau: '+e.message); }
}
load();
</script>
</body>
</html>
